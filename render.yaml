services:
  - type: web
    name: music-platform-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: music-platform-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: HTTPS_REDIRECT
        value: "false"
      - key: DOCS_ENABLED
        value: "false"
      - key: REDOC_ENABLED
        value: "false"
      - key: REDIS_ENABLED
        value: "false"

databases:
  - name: music-platform-db
    plan: free
